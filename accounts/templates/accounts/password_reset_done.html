{% extends 'accounts/auth_base.html' %}
{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 520px; margin: 0 auto; text-align:center;">
  <h1 style="color: var(--hot-pink); text-shadow: 0 0 12px var(--hot-pink); margin-bottom:.5rem;">
    ✅ Check your email
  </h1>

  <p style="color:#aaa; margin:0 0 1.2rem 0;">
    If an account exists for that email, a reset link was sent.
  </p>

  <p style="color:#777; margin:0 0 1.4rem 0;">
    Don’t see it? Check spam/promotions, or try again.
  </p>

  <a class="submit-btn" href="{% url 'password_reset' %}" style="display:inline-block; text-decoration:none;">
    Send another link
  </a>
</div>
{% endblock %}
