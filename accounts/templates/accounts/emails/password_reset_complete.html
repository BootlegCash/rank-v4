{% extends "accounts/auth_base.html" %}
{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="glass-card" style="max-width:520px;margin:0 auto;text-align:center;">
  <h1 style="color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan); margin-bottom: 10px;">
    🎉 Password updated
  </h1>
  <p style="color:#9aa0aa; margin:0 0 14px;">
    You can now log in with your new password.
  </p>
  <a class="neon-btn" href="{% url 'login' %}" style="display:inline-block; padding: 10px 16px;">
    Log in
  </a>
</div>
{% endblock %}
