{% extends "accounts/auth_base.html" %}
{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="glass-card neon-card">

  <div class="icon-badge">✅</div>

  <h1 class="neon-title">
    Check your email
  </h1>

  <p class="muted-text">
    If an account exists for that email, we sent a password reset link.
  </p>

  <p class="helper-text">
    Didn’t get it? Check spam/junk just in case.
  </p>

  <a href="{% url 'login' %}" class="submit-btn neon-full-btn">
    Back to login
  </a>

</div>
{% endblock %}
