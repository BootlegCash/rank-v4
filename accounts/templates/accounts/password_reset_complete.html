{% extends 'accounts/auth_base.html' %}
{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 520px; margin: 0 auto; text-align:center;">
  <h1 style="color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan); margin-bottom:.5rem;">
    ✅ Password updated
  </h1>

  <p style="color:#aaa; margin:0 0 1.4rem 0;">
    You can log in with your new password now.
  </p>

  <a class="submit-btn" href="{% url 'login' %}" style="display:inline-block; text-decoration:none;">
    Go to login
  </a>
</div>
{% endblock %}
