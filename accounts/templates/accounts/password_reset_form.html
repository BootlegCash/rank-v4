{% extends "base.html" %}
{% block content %}
<div class="glass-card">
  <h2 class="gradient-text">Reset Password</h2>
  <p style="opacity:.8;">Enter the email on your account. We’ll send you a reset link.</p>

  <form method="post" style="margin-top:1rem;">
    {% csrf_token %}
    {{ form.email.errors }}
    {{ form.email }}
    <button type="submit" class="neon-btn pink-btn" style="width:100%; margin-top:1rem;">
      Send reset link
    </button>
  </form>

  <div style="text-align:center; margin-top:1rem;">
    <a class="footer-link" href="{% url 'login' %}">Back to login</a>
  </div>
</div>
{% endblock %}
